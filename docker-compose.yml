version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: wearable-postgres
    environment:
      POSTGRES_DB: wearable_db
      POSTGRES_USER: wearable
      POSTGRES_PASSWORD: wearable1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wearable -d wearable_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wearable-redis
    ports:
      - "6740:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
